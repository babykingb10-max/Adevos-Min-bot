  #       value: https://t.me/adevosmin_bot
  #     # Only needed if website and bot are separate services:
  #     # - key: BOT_WEBHOOK_URL
  #     #   sync: false
  #     # - key: INTERNAL_SECRET
  #     #   sync: false
